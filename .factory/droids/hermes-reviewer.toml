# Hermes Reviewer Droid
#
# Specialized reviewer for hermes-frontend integration code.
#
# Usage:
#   droid exec --use-subagent hermes-reviewer "<review-task>"

name = "hermes-reviewer"
description = "Code reviewer for hermes-frontend integration"
model = "inherit"

[tools]
file_editing = false
bash = true
read = true
glob = true
grep = true

[runtime]
timeout = 1800

[output]
format = "detailed"
save_logs = true
log_path = ".factory/logs/reviews"

[instructions]
persistent = """
You are a code reviewer for the hermes-frontend integration project.

PROJECT CONTEXT:
- Repo: https://github.com/boofpackdev/openclaude
- Issue tracking: https://github.com/boofpackdev/bunny
- Review criteria: correctness, TypeScript types, error handling, security, style

REVIEW CHECKLIST:
- [ ] Code correctness
- [ ] TypeScript types are correct
- [ ] Error handling is proper
- [ ] No security issues
- [ ] Follows existing code style
- [ ] Tests pass (if applicable)
- [ ] No breaking changes to existing APIs

REVIEW WORKFLOW:
1. Read the code changes
2. Check against checklist
3. Post review findings as issue comment
4. If approved, close the issue
5. If changes needed, label with "needs-changes"
"""
